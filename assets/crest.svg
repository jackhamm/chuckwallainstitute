<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220" role="img" aria-label="Chuck Walla Institute crest">
  <defs>
    <radialGradient id="sky" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f5d9a8"/>
      <stop offset="100%" stop-color="#d9b382"/>
    </radialGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9b382"/>
      <stop offset="100%" stop-color="#a0522d"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M100 10 L185 35 L185 110 Q185 175 100 210 Q15 175 15 110 L15 35 Z"
        fill="url(#sky)" stroke="#7a3b1f" stroke-width="3"/>

  <!-- Mountain silhouette -->
  <path d="M15 130 L55 90 L80 115 L110 75 L150 120 L185 95 L185 175 L15 175 Z"
        fill="#7a8b6f" opacity="0.85"/>
  <path d="M15 155 L40 135 L75 155 L120 130 L160 150 L185 140 L185 195 L15 195 Z"
        fill="url(#sand)"/>

  <!-- Saguaro -->
  <g fill="#4f5e48" stroke="#2b2118" stroke-width="1">
    <rect x="96" y="80" width="8" height="60" rx="3"/>
    <rect x="86" y="100" width="6" height="20" rx="2"/>
    <rect x="86" y="98" width="14" height="6" rx="2"/>
    <rect x="108" y="92" width="6" height="28" rx="2"/>
    <rect x="100" y="90" width="14" height="6" rx="2"/>
  </g>

  <!-- Sun -->
  <circle cx="140" cy="55" r="14" fill="#a0522d" opacity="0.85"/>

  <!-- Equation banner: alpha symbol nodding to QED -->
  <rect x="35" y="158" width="130" height="22" fill="#2b2118" opacity="0.85"/>
  <text x="100" y="174" text-anchor="middle"
        font-family="Cormorant Garamond, Garamond, serif"
        font-size="14" fill="#faf3e3" font-style="italic">α = e² ⁄ 4πε₀ℏc</text>

  <!-- Motto ribbon -->
  <text x="100" y="206" text-anchor="middle"
        font-family="Cormorant Garamond, serif"
        font-size="11" fill="#7a3b1f" letter-spacing="2">SCIENTIA · IN · DESERTO</text>
</svg>
